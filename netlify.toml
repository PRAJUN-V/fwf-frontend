# Netlify configuration for the Fun With Friends frontend (Next.js).
# This file lives at the root of the frontend repository. Connect the repo in
# Netlify; with continuous deployment enabled, every push to `master` builds and
# publishes automatically.
#
# Required environment variables (set in Netlify -> Site settings -> Environment):
#   NEXT_PUBLIC_API_BASE_URL = https://<your-render-service>.onrender.com
#   NEXT_PUBLIC_WS_BASE_URL  = wss://<your-render-service>.onrender.com

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
